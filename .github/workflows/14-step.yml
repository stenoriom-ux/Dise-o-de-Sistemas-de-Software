name: Paso 14 — Comando

on:
  push:
    branches:
      - main
    paths:
      - 'src/main/kotlin/patterns/behavioral/Command.kt'

jobs:
  check_step_14:
    name: Verificar Paso 14
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar que Command.kt implementa Comando
        id: check
        run: |
          FILE="src/main/kotlin/patterns/behavioral/Command.kt"

          if [ ! -f "$FILE" ]; then
            echo "⏭️ Paso 14 aún no completado — archivo no encontrado."
            exit 0
          fi

          if ! grep -Eq 'interface\\s+(Command|Comando)\\b' "$FILE"; then
            echo "⏭️ Debe existir una interfaz `Command` o `Comando`."
            exit 0
          fi

          if ! grep -Eq 'fun\\s+execute\\s*\\(' "$FILE"; then
            echo "⏭️ Debe existir un método `execute()`."
            exit 0
          fi

          echo "✅ Paso 14 verificado correctamente."
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Publicar Paso 15 en el issue
        if: steps.check.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list --label "ejercicio" --state open --json number --jq '.[0].number')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "⏭️ No hay issue de ejercicio abierto — omitiendo comentario."
            exit 0
          fi
          gh issue comment "$ISSUE_NUMBER"             --body "$(cat .github/steps/15-step.md)"
