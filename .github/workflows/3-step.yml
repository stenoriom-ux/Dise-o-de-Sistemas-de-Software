name: Paso 3 — Constructor

on:
  push:
    branches:
      - main
    paths:
      - 'src/main/kotlin/patterns/creational/Builder.kt'

jobs:
  check_step_3:
    name: Verificar Paso 3
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar que Builder.kt implementa Constructor
        id: check
        run: |
          FILE="src/main/kotlin/patterns/creational/Builder.kt"

          if [ ! -f "$FILE" ]; then
            echo "⏭️ Paso 3 aún no completado — archivo no encontrado."
            exit 0
          fi

          if ! grep -Eq 'class\\s+(Builder|Constructor)\\b' "$FILE"; then
            echo "⏭️ Debe existir una clase `Builder` o `Constructor`."
            exit 0
          fi

          if ! grep -Eq 'fun\\s+build\\s*\\(' "$FILE"; then
            echo "⏭️ Debe existir un método `build()` que devuelva el objeto final."
            exit 0
          fi

          echo "✅ Paso 3 verificado correctamente."
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Publicar Paso 4 en el issue
        if: steps.check.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list --label "ejercicio" --state open --json number --jq '.[0].number')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "⏭️ No hay issue de ejercicio abierto — omitiendo comentario."
            exit 0
          fi
          gh issue comment "$ISSUE_NUMBER"             --body "$(cat .github/steps/4-step.md)"
