name: Paso 8 — Objeto compuesto

on:
  push:
    branches:
      - main
    paths:
      - 'src/main/kotlin/patterns/structural/Composite.kt'

jobs:
  check_step_8:
    name: Verificar Paso 8
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar que Composite.kt implementa Objeto compuesto
        id: check
        run: |
          FILE="src/main/kotlin/patterns/structural/Composite.kt"

          if [ ! -f "$FILE" ]; then
            echo "⏭️ Paso 8 aún no completado — archivo no encontrado."
            exit 0
          fi

          if ! grep -Eq 'interface\\s+(Component|Componente)\\b' "$FILE"; then
            echo "⏭️ Debe existir una interfaz `Component` o `Componente`."
            exit 0
          fi

          if ! grep -Eq 'add\\s*\\(' "$FILE"; then
            echo "⏭️ El compuesto debe exponer una operación `add(...)`."
            exit 0
          fi

          echo "✅ Paso 8 verificado correctamente."
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Publicar Paso 9 en el issue
        if: steps.check.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list --label "ejercicio" --state open --json number --jq '.[0].number')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "⏭️ No hay issue de ejercicio abierto — omitiendo comentario."
            exit 0
          fi
          gh issue comment "$ISSUE_NUMBER"             --body "$(cat .github/steps/9-step.md)"
