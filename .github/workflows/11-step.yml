name: Paso 11 — Peso mosca

on:
  push:
    branches:
      - main
    paths:
      - 'src/main/kotlin/patterns/structural/Flyweight.kt'

jobs:
  check_step_11:
    name: Verificar Paso 11
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar que Flyweight.kt implementa Peso mosca
        id: check
        run: |
          FILE="src/main/kotlin/patterns/structural/Flyweight.kt"

          if [ ! -f "$FILE" ]; then
            echo "⏭️ Paso 11 aún no completado — archivo no encontrado."
            exit 0
          fi

          if ! grep -Eq 'class\\s+(FlyweightFactory|FabricaPesoMosca)\\b' "$FILE"; then
            echo "⏭️ Debe existir una fábrica de flyweights."
            exit 0
          fi

          if ! grep -Eq '(map|cache)' "$FILE"; then
            echo "⏭️ Debes usar un `map` o `cache` para reutilizar instancias."
            exit 0
          fi

          echo "✅ Paso 11 verificado correctamente."
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Publicar Paso 12 en el issue
        if: steps.check.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list --label "ejercicio" --state open --json number --jq '.[0].number')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "⏭️ No hay issue de ejercicio abierto — omitiendo comentario."
            exit 0
          fi
          gh issue comment "$ISSUE_NUMBER"             --body "$(cat .github/steps/12-step.md)"
