name: Paso 2 — Fábrica abstracta

on:
  push:
    branches:
      - main
    paths:
      - 'src/main/kotlin/patterns/creational/AbstractFactory.kt'

jobs:
  check_step_2:
    name: Verificar Paso 2
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar que AbstractFactory.kt implementa Fábrica abstracta
        id: check
        run: |
          FILE="src/main/kotlin/patterns/creational/AbstractFactory.kt"

          if [ ! -f "$FILE" ]; then
            echo "⏭️ Paso 2 aún no completado — archivo no encontrado."
            exit 0
          fi

          if ! grep -Eq 'interface\\s+(AbstractFactory|FabricaAbstracta)\\b' "$FILE"; then
            echo "⏭️ Debe existir una interfaz `AbstractFactory` o `FabricaAbstracta`."
            exit 0
          fi

          if ! grep -Eq 'interface\\s+(Product|Producto)' "$FILE"; then
            echo "⏭️ Debes modelar al menos una interfaz de producto con el nombre `Product...` o `Producto...`."
            exit 0
          fi

          echo "✅ Paso 2 verificado correctamente."
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Publicar Paso 3 en el issue
        if: steps.check.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list --label "ejercicio" --state open --json number --jq '.[0].number')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "⏭️ No hay issue de ejercicio abierto — omitiendo comentario."
            exit 0
          fi
          gh issue comment "$ISSUE_NUMBER"             --body "$(cat .github/steps/3-step.md)"
