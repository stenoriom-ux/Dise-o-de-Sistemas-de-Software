name: Paso 21 — Método plantilla

on:
  push:
    branches:
      - main
    paths:
      - 'src/main/kotlin/patterns/behavioral/TemplateMethod.kt'

jobs:
  check_step_21:
    name: Verificar Paso 21
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar que TemplateMethod.kt implementa Método plantilla
        id: check
        run: |
          FILE="src/main/kotlin/patterns/behavioral/TemplateMethod.kt"

          if [ ! -f "$FILE" ]; then
            echo "⏭️ Paso 21 aún no completado — archivo no encontrado."
            exit 0
          fi

          if ! grep -Eq 'abstract\\s+class' "$FILE"; then
            echo "⏭️ Debe existir una clase abstracta."
            exit 0
          fi

          if ! grep -Eq 'abstract\\s+fun' "$FILE"; then
            echo "⏭️ Debe existir al menos un método abstracto."
            exit 0
          fi

          if ! grep -Eq 'fun\\s+(templateMethod|metodoPlantilla)\\s*\\(' "$FILE"; then
            echo "⏭️ Debe existir `templateMethod(...)` o `metodoPlantilla(...)`."
            exit 0
          fi

          echo "✅ Paso 21 verificado correctamente."
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Publicar Paso 22 en el issue
        if: steps.check.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list --label "ejercicio" --state open --json number --jq '.[0].number')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "⏭️ No hay issue de ejercicio abierto — omitiendo comentario."
            exit 0
          fi
          gh issue comment "$ISSUE_NUMBER"             --body "$(cat .github/steps/22-step.md)"
