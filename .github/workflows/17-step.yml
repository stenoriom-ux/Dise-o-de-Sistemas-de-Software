name: Paso 17 — Recuerdo

on:
  push:
    branches:
      - main
    paths:
      - 'src/main/kotlin/patterns/behavioral/Memento.kt'

jobs:
  check_step_17:
    name: Verificar Paso 17
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar que Memento.kt implementa Recuerdo
        id: check
        run: |
          FILE="src/main/kotlin/patterns/behavioral/Memento.kt"

          if [ ! -f "$FILE" ]; then
            echo "⏭️ Paso 17 aún no completado — archivo no encontrado."
            exit 0
          fi

          if ! grep -Eq 'class\\s+Memento\\b' "$FILE"; then
            echo "⏭️ Debe existir una clase `Memento`."
            exit 0
          fi

          if ! grep -Eq 'fun\\s+(save|guardar)\\s*\\(' "$FILE"; then
            echo "⏭️ Debe existir un método `save(...)` o `guardar(...)`."
            exit 0
          fi

          echo "✅ Paso 17 verificado correctamente."
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Publicar Paso 18 en el issue
        if: steps.check.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list --label "ejercicio" --state open --json number --jq '.[0].number')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "⏭️ No hay issue de ejercicio abierto — omitiendo comentario."
            exit 0
          fi
          gh issue comment "$ISSUE_NUMBER"             --body "$(cat .github/steps/18-step.md)"
