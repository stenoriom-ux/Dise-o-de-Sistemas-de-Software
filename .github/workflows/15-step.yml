name: Paso 15 — Iterador

on:
  push:
    branches:
      - main
    paths:
      - 'src/main/kotlin/patterns/behavioral/Iterator.kt'

jobs:
  check_step_15:
    name: Verificar Paso 15
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar que Iterator.kt implementa Iterador
        id: check
        run: |
          FILE="src/main/kotlin/patterns/behavioral/Iterator.kt"

          if [ ! -f "$FILE" ]; then
            echo "⏭️ Paso 15 aún no completado — archivo no encontrado."
            exit 0
          fi

          if ! grep -Eq 'fun\\s+hasNext\\s*\\(' "$FILE"; then
            echo "⏭️ Debe existir `hasNext()`."
            exit 0
          fi

          if ! grep -Eq 'fun\\s+next\\s*\\(' "$FILE"; then
            echo "⏭️ Debe existir `next()`."
            exit 0
          fi

          echo "✅ Paso 15 verificado correctamente."
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Publicar Paso 16 en el issue
        if: steps.check.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list --label "ejercicio" --state open --json number --jq '.[0].number')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "⏭️ No hay issue de ejercicio abierto — omitiendo comentario."
            exit 0
          fi
          gh issue comment "$ISSUE_NUMBER"             --body "$(cat .github/steps/16-step.md)"
