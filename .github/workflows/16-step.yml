name: Paso 16 — Mediador

on:
  push:
    branches:
      - main
    paths:
      - 'src/main/kotlin/patterns/behavioral/Mediator.kt'

jobs:
  check_step_16:
    name: Verificar Paso 16
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar que Mediator.kt implementa Mediador
        id: check
        run: |
          FILE="src/main/kotlin/patterns/behavioral/Mediator.kt"

          if [ ! -f "$FILE" ]; then
            echo "⏭️ Paso 16 aún no completado — archivo no encontrado."
            exit 0
          fi

          if ! grep -Eq 'interface\\s+(Mediator|Mediador)\\b' "$FILE"; then
            echo "⏭️ Debe existir una interfaz `Mediator` o `Mediador`."
            exit 0
          fi

          if ! grep -Eq 'fun\\s+(notify|notificar)\\s*\\(' "$FILE"; then
            echo "⏭️ Debe existir un método `notify(...)` o `notificar(...)`."
            exit 0
          fi

          echo "✅ Paso 16 verificado correctamente."
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Publicar Paso 17 en el issue
        if: steps.check.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list --label "ejercicio" --state open --json number --jq '.[0].number')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "⏭️ No hay issue de ejercicio abierto — omitiendo comentario."
            exit 0
          fi
          gh issue comment "$ISSUE_NUMBER"             --body "$(cat .github/steps/17-step.md)"
