name: Paso 7 — Puente

on:
  push:
    branches:
      - main
    paths:
      - 'src/main/kotlin/patterns/structural/Bridge.kt'

jobs:
  check_step_7:
    name: Verificar Paso 7
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar que Bridge.kt implementa Puente
        id: check
        run: |
          FILE="src/main/kotlin/patterns/structural/Bridge.kt"

          if [ ! -f "$FILE" ]; then
            echo "⏭️ Paso 7 aún no completado — archivo no encontrado."
            exit 0
          fi

          if ! grep -Eq 'interface\\s+(Implementation|Implementacion)\\b' "$FILE"; then
            echo "⏭️ Debes definir una interfaz `Implementation` o `Implementacion`."
            exit 0
          fi

          echo "✅ Paso 7 verificado correctamente."
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Publicar Paso 8 en el issue
        if: steps.check.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list --label "ejercicio" --state open --json number --jq '.[0].number')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "⏭️ No hay issue de ejercicio abierto — omitiendo comentario."
            exit 0
          fi
          gh issue comment "$ISSUE_NUMBER"             --body "$(cat .github/steps/8-step.md)"
